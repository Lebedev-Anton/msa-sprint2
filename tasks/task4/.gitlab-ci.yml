stages:
  - build
  - test
  - deploy
  - tag

variables:
  IMAGE_TAG: latest
  IMAGE_NAME: booking-service

build:
  stage: build
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG ./booking-service/

test:
  stage: test
  script:
    - docker run -d --name test-booking -p 8080:8080 $IMAGE_NAME:$IMAGE_TAG
    - sleep 3
    - curl -f http://localhost:8080/ping
    - echo "/ping returned pong"
  after_script:
    - docker rm -f test-booking || true

deploy:
  stage: deploy
  script:
    - minikube image load $IMAGE_NAME:$IMAGE_TAG
    - helm upgrade --install booking-service ./helm/booking-service/ --set image.name=$IMAGE_NAME --set image.tag=$IMAGE_TAG --set image.pullPolicy=Never
    - echo "Deployed to Minikube"
    - kubectl get pods -l app=booking-service
    - kubectl get svc booking-service

tag:
  stage: tag
  script:
    - TIMESTAMP=$(date +%Y%m%d-%H%M%S)
    - git tag "release-$TIMESTAMP" || true