replicaCount: 1

createService: false

image:
  name: booking-service
  tag: v2
  pullPolicy: Never

version: v2

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

env:
  - name: SERVICE_VERSION
    value: "v2"
  - name: ENABLE_FEATURE_X
    value: "true"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3
