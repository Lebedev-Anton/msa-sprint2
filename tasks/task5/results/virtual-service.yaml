apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: booking-service-gateway
spec:
  hosts:
    - "*"
  gateways:
    - booking-gateway
  http:
    # Feature flag route: X-Feature-Enabled: true -> v2
    - match:
        - headers:
            x-feature-enabled:
              exact: "true"
      route:
        - destination:
            host: booking-service
            subset: v2
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure,retriable-4xx

    # Canary: 90% v1, 10% v2
    - route:
        - destination:
            host: booking-service
            subset: v1
          weight: 90
        - destination:
            host: booking-service
            subset: v2
          weight: 10
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure,retriable-4xx
---
